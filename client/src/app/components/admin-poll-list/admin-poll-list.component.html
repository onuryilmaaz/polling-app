<div
  *ngIf="activePolls.length > 0; else noPolls"
  class="max-w-4xl mx-auto mt-8"
>
  <h2 class="text-2xl font-bold text-gray-800 mb-4">Aktif Anketler</h2>

  <ul class="space-y-4">
    <li
      *ngFor="let poll of activePolls"
      class="bg-white shadow-md rounded-lg p-4 border border-gray-200 hover:shadow-lg transition-shadow duration-300 flex flex-col sm:flex-row justify-between items-start sm:items-center"
    >
      <div class="flex-1">
        <h3 class="text-lg font-semibold text-gray-900">{{ poll.title }}</h3>
        <p class="text-gray-600 text-sm mb-1">{{ poll.description }}</p>
        <p class="text-sm text-gray-500">
          Soru Sayısı: {{ poll.questionCount }}
        </p>
        <p class="text-sm text-gray-500">
          Cevap Sayısı: {{ poll.responseCount }}
        </p>
      </div>

      <div class="mt-3 sm:mt-0 flex space-x-2">
        <a
          [routerLink]="['/poll/edit', poll.id]"
          class="bg-yellow-500 text-white px-3 py-1 rounded-md hover:bg-yellow-600 transition-colors text-sm"
        >
          Anketi Düzenle
        </a>
        <button
          (click)="deletePoll(poll.id)"
          class="bg-red-500 text-white px-3 py-1 rounded-md hover:bg-red-600 transition-colors text-sm"
        >
          Anketi Sil
        </button>
      </div>
    </li>
  </ul>
</div>

<ng-template #noPolls>
  <p class="text-center text-gray-500 mt-6">Aktif anket bulunamadı.</p>
</ng-template>
