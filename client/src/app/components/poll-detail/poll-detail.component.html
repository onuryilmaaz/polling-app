<div
  *ngIf="poll; else loading"
  class="max-w-4xl mx-auto mt-8 p-6 bg-white shadow-md rounded-lg"
>
  <h2 class="text-2xl font-bold text-gray-800 mb-4">{{ poll.title }}</h2>
  <p class="text-gray-600 mb-6">{{ poll.description }}</p>

  <form (ngSubmit)="submitResponse()">
    <div *ngFor="let question of poll.questions" class="mb-8">
      <h3 class="text-lg font-semibold text-gray-900 mb-3">
        {{ question.text }}
      </h3>

      <div *ngIf="question.type === 0 || question.type === 1" class="space-y-2">
        <div *ngFor="let option of question.options" class="flex items-center">
          <input
            type="{{ question.type === 0 ? 'radio' : 'checkbox' }}"
            [name]="'question' + question.id"
            [id]="'option' + option.id"
            [(ngModel)]="selectedOptions[question.id]"
            [value]="option.id"
            class="mr-2"
          />
          <label [for]="'option' + option.id" class="text-gray-700">{{
            option.text
          }}</label>
        </div>
      </div>

      <div *ngIf="question.type === 2" class="space-y-2">
        <textarea
          [name]="'question' + question.id"
          [(ngModel)]="textAnswers[question.id]"
          class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          rows="3"
        ></textarea>
      </div>

      <div *ngIf="question.type === 3" class="space-y-2">
        <div *ngFor="let option of question.options" class="flex items-center">
          <select
            [name]="'question' + question.id"
            [(ngModel)]="rankedOptions[question.id][option.id]"
            class="mr-2 p-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option
              *ngFor="
                let i of [].constructor(question.options?.length);
                let idx = index
              "
              [value]="idx + 1"
            >
              {{ idx + 1 }}
            </option>
          </select>
          <label class="text-gray-700">{{ option.text }}</label>
        </div>
      </div>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors"
    >
      Ankete Katıl
    </button>
  </form>
</div>

<ng-template #loading>
  <p class="text-center text-gray-500 mt-6">Anket yükleniyor...</p>
</ng-template>
